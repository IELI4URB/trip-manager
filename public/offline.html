<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <title>Offline - Trip Manager</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 440px;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .icon-container {
      width: 120px;
      height: 120px;
      margin: 0 auto 32px;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.2) 0%, rgba(139, 92, 246, 0.2) 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .icon-container::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      opacity: 0.3;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.05); opacity: 0.5; }
    }

    .icon-container svg {
      width: 56px;
      height: 56px;
      color: #3b82f6;
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    button {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    button svg {
      width: 20px;
      height: 20px;
    }

    .secondary-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .secondary-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      box-shadow: none;
    }

    .status {
      margin-top: 40px;
      padding: 16px 24px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .status-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      color: #94a3b8;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f59e0b;
      animation: blink 1.5s ease-in-out infinite;
    }

    .status-dot.online {
      background: #22c55e;
      animation: none;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .cached-trips {
      margin-top: 24px;
      text-align: left;
    }

    .cached-trips h3 {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .cached-trip-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cached-trip {
      background: rgba(255, 255, 255, 0.05);
      padding: 12px 16px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .cached-trip:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .cached-trip-icon {
      width: 36px;
      height: 36px;
      background: rgba(59, 130, 246, 0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cached-trip-icon svg {
      width: 18px;
      height: 18px;
      color: #3b82f6;
    }

    .cached-trip-info {
      flex: 1;
    }

    .cached-trip-name {
      font-weight: 500;
      font-size: 14px;
    }

    .cached-trip-date {
      font-size: 12px;
      color: #64748b;
    }

    .empty-state {
      text-align: center;
      padding: 20px;
      color: #64748b;
      font-size: 14px;
    }

    footer {
      position: fixed;
      bottom: 20px;
      text-align: center;
      color: #475569;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-container">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 011.06 0z" />
      </svg>
    </div>

    <h1>You're Offline</h1>
    <p class="subtitle">
      Don't worry! Your trip data is cached locally. 
      You can still view your saved trips while offline.
    </p>

    <div class="actions">
      <button onclick="tryReconnect()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
        Try Again
      </button>
      <button class="secondary-btn" onclick="goHome()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
        </svg>
        View Cached Data
      </button>
    </div>

    <div class="status">
      <div class="status-indicator">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Waiting for connection...</span>
      </div>
    </div>

    <div class="cached-trips" id="cachedTrips">
      <h3>Cached Trips</h3>
      <div class="cached-trip-list" id="tripList">
        <div class="empty-state">Checking cache...</div>
      </div>
    </div>
  </div>

  <footer>
    Trip Manager • Your AI Travel Companion
  </footer>

  <script>
    // Check connection status
    function checkConnection() {
      const statusDot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      
      if (navigator.onLine) {
        statusDot.classList.add('online');
        statusText.textContent = 'Connection restored!';
        setTimeout(() => {
          window.location.href = '/';
        }, 1000);
      } else {
        statusDot.classList.remove('online');
        statusText.textContent = 'Waiting for connection...';
      }
    }

    // Try to reconnect
    function tryReconnect() {
      checkConnection();
      if (!navigator.onLine) {
        const btn = event.target.closest('button');
        btn.innerHTML = '<svg class="spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" /></svg> Checking...';
        setTimeout(() => {
          btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" /></svg> Try Again';
          checkConnection();
        }, 2000);
      }
    }

    // Go to cached home
    function goHome() {
      window.location.href = '/';
    }

    // Load cached trips
    async function loadCachedTrips() {
      const tripList = document.getElementById('tripList');
      
      try {
        const cache = await caches.open('trip-manager-api-v1');
        const keys = await cache.keys();
        const tripKeys = keys.filter(req => req.url.includes('/api/trips/') && !req.url.includes('/api/trips/['));
        
        if (tripKeys.length === 0) {
          tripList.innerHTML = '<div class="empty-state">No trips cached yet. Browse some trips while online to access them offline.</div>';
          return;
        }

        tripList.innerHTML = '';
        
        for (const request of tripKeys.slice(0, 5)) {
          try {
            const response = await cache.match(request);
            const trip = await response.json();
            
            if (trip && trip.name) {
              const tripEl = document.createElement('div');
              tripEl.className = 'cached-trip';
              tripEl.onclick = () => window.location.href = `/trips/${trip.id}`;
              tripEl.innerHTML = `
                <div class="cached-trip-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                  </svg>
                </div>
                <div class="cached-trip-info">
                  <div class="cached-trip-name">${trip.name}</div>
                  <div class="cached-trip-date">${trip.destination || 'Trip'}</div>
                </div>
              `;
              tripList.appendChild(tripEl);
            }
          } catch (e) {
            console.log('Could not parse cached trip');
          }
        }

        if (tripList.children.length === 0) {
          tripList.innerHTML = '<div class="empty-state">No trips cached yet.</div>';
        }
      } catch (error) {
        tripList.innerHTML = '<div class="empty-state">Could not access cache.</div>';
      }
    }

    // Add spinning animation
    const style = document.createElement('style');
    style.textContent = '.spin { animation: spin 1s linear infinite; } @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }';
    document.head.appendChild(style);

    // Initialize
    window.addEventListener('online', checkConnection);
    window.addEventListener('offline', checkConnection);
    checkConnection();
    loadCachedTrips();
  </script>
</body>
</html>
